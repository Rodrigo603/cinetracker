<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
<div class="auth-box">
    <h1>Cadastrar</h1>
    <form onsubmit="fazerCadastro(event)">
        <div class="input-group"><input type="text"     id="nome"      placeholder="Nome completo" required></div>
        <div class="input-group"><input type="email"    id="email"     placeholder="Email"         required></div>
        <div class="input-group"><input type="tel"      id="telefone"  placeholder="Telefone"      required></div>
        <div class="input-group"><input type="password" id="senha"     placeholder="Senha"         required></div>
        <p id="erroCadastro" style="color: #e50914; display: none; text-align: center;">
            Erro ao cadastrar. Tente novamente.
        </p>
        <button type="submit" class="btn-primary">Finalizar Cadastro</button>
    </form>
    <div class="auth-switch">
        Já tem uma conta? <a href="index.html">Faça login.</a>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/cadastro.js"></script>
</body>
</html>
