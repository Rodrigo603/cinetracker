<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
<div class="auth-box">
    <h1>Entrar</h1>
    <form onsubmit="fazerLogin(event)">
        <div class="input-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
            <input type="password" id="senha" placeholder="Senha" required>
        </div>
        <p id="erroLogin" style="color: #e50914; display: none; text-align: center;">
            Email ou senha inválidos.
        </p>
        <button type="submit" class="btn-primary">Entrar</button>
    </form>
    <div class="auth-switch">
        Novo por aqui? <a href="cadastro.html">Cadastre-se agora.</a>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    async function fazerLogin(event) {
        event.preventDefault();

        const email = document.getElementById('email').value;
        const senha = document.getElementById('senha').value;
        const erro  = document.getElementById('erroLogin');
        erro.style.display = 'none';

        try {
            const resAdmin = await API.loginAdmin(email, senha);
            if (resAdmin.ok) {
                const admin = await resAdmin.json();
                API.setSessao({
                    id:    admin.id,
                    nome:  admin.nome,
                    email: admin.email,
                    admin: true
                });
                window.location.href = 'home.html';
                return;
            }
        } catch (e) {
            console.error("Erro ao tentar login admin", e);
        }

        try {
            const resUser = await API.loginUsuario(email, senha);
            if (resUser.ok) {
                const usuario = await resUser.json();
                API.setSessao({
                    id:    usuario.id,
                    nome:  usuario.nome,
                    email: usuario.email,
                    admin: false
                });
                window.location.href = 'home.html';
                return;
            }
        } catch (e) {
            console.error("Erro ao tentar login usuário", e);
        }

        erro.style.display = 'block';
    }
</script>
</body>
</html>
