<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Perfil - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-header { text-align: center; margin-bottom: 30px; }
        .avatar-circle {
            width: 100px; height: 100px; background: #222; border-radius: 50%;
            margin: 0 auto 15px; display: flex; align-items: center;
            justify-content: center; font-size: 40px; color: #e50914;
            border: 2px solid #e50914; font-weight: bold;
        }
        .role-badge {
            display: inline-block; padding: 5px 15px; border-radius: 20px;
            font-size: 12px; font-weight: bold; text-transform: uppercase;
            background: #333; color: #888; margin-top: 10px;
        }
        .admin-badge { background: #e50914; color: white; }
    </style>
</head>
<body>
<nav>
    <a href="home.html" class="logo">CineTracker</a>
    <div class="nav-links">
        <a href="home.html">Início</a>
        <a href="admin.html" id="linkAdmin" style="display: none;">Painel Admin</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" onclick="API.encerrarSessao()">Sair</a>
    </div>
</nav>

<div class="content-section">
    <div class="profile-header">
        <div class="avatar-circle" id="userInitial">?</div>
        <h2 id="userNameLabel" style="margin: 0; color: white;">Carregando...</h2>
        <div id="userBadge" class="role-badge">Usuário</div>
    </div>

    <div class="form-card">
        <form id="formPerfil" onsubmit="salvarPerfil(event)">
            <div class="input-group">
                <label>Nome Completo</label>
                <input type="text"  id="perfilNome"     readonly required>
            </div>
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" id="perfilEmail"    readonly required>
            </div>
            <div class="input-group">
                <label>Telefone</label>
                <input type="tel"   id="perfilTelefone" readonly required>
            </div>
            <div class="input-group" id="divSenha" style="display: none;">
                <label>Nova Senha (deixe em branco para manter a atual)</label>
                <input type="password" id="perfilSenha" placeholder="••••••••">
            </div>

            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button type="button" id="btnEditar"   class="btn-secondary"                    onclick="habilitarEdicao()">Editar Dados</button>
                <button type="submit" id="btnSalvar"   class="btn-primary"  style="display:none;">Confirmar Alterações</button>
                <button type="button" id="btnCancelar" class="btn-secondary" style="display:none;" onclick="location.reload()">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const sessao = API.getSessao();
        if (!sessao || !sessao.id) { window.location.href = 'index.html'; return; }

        try {
            let response;

            if (sessao.admin) {
                response = await API.buscarAdmin(sessao.id);
            } else {
                response = await API.buscarUsuario(sessao.id);
            }

            if (!response.ok) {
                return;
            }

            const usuario = await response.json();

            document.getElementById('userNameLabel').innerText        = usuario.nome;
            document.getElementById('userInitial').innerText          = usuario.nome.charAt(0).toUpperCase();
            document.getElementById('perfilNome').value               = usuario.nome;
            document.getElementById('perfilEmail').value              = usuario.email;
            document.getElementById('perfilTelefone').value           = usuario.telefone;

            if (sessao.admin) {
                document.getElementById('linkAdmin').style.display = 'block';
                const badge = document.getElementById('userBadge');
                badge.innerText = "Administrador";
                badge.classList.add('admin-badge');
            }

            API.setSessao({ ...sessao, nome: usuario.nome, email: usuario.email });

        } catch (e) {
            console.error(e);
        }
    });

    function habilitarEdicao() {
        document.getElementById('perfilNome').readOnly     = false;
        document.getElementById('perfilTelefone').readOnly = false;
        document.getElementById('divSenha').style.display  = 'block';
        document.getElementById('btnEditar').style.display  = 'none';
        document.getElementById('btnSalvar').style.display  = 'block';
        document.getElementById('btnCancelar').style.display = 'block';
    }

    async function salvarPerfil(event) {
        event.preventDefault();
        const sessao = API.getSessao();

        const novaSenha = document.getElementById('perfilSenha').value;

        const payload = {
            nome:      document.getElementById('perfilNome').value,
            email:     document.getElementById('perfilEmail').value,
            telefone:  document.getElementById('perfilTelefone').value,
            ...(novaSenha ? { senha: novaSenha } : {})
        };

        try {
            let response;

            if (sessao.admin) {
                response = await API.atualizarAdmin(sessao.id, payload);
            } else {
                response = await API.atualizarUsuario(sessao.id, payload);
            }

            if (response.ok) {
                API.setSessao({ ...sessao, nome: payload.nome, email: payload.email });
                alert("Perfil atualizado com sucesso!");
                location.reload();
            } else {
                alert("Erro ao atualizar perfil.");
            }
        } catch (e) {
            alert("Erro de conexão.");
        }
    }
</script>
</body>
</html>
