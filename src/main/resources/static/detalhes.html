<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhes - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .detalhes-container { display: flex; gap: 40px; padding: 40px 5%; margin-top: 40px; }
        .detalhes-poster { width: 300px; height: 450px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); object-fit: cover; flex-shrink: 0; }
        .detalhes-info { flex: 1; color: #fff; }
        .detalhes-titulo { font-size: 42px; font-weight: 700; margin-bottom: 10px; }
        .detalhes-tags { color: #888; font-size: 16px; margin-bottom: 25px; display: flex; gap: 15px; flex-wrap: wrap; }
        .detalhes-tag-item { background: #333; padding: 5px 12px; border-radius: 4px; color: #fff; font-weight: 600; }
        .detalhes-sinopse { font-size: 18px; line-height: 1.6; color: #ccc; margin-bottom: 30px; }

        /* Episódios */
        .episodios-wrapper { margin-top: 30px; }
        .episodios-toggle-btn {
            display: flex; align-items: center; gap: 10px;
            background: #181818; border: 1px solid #333; color: #fff;
            padding: 14px 20px; border-radius: 10px; cursor: pointer;
            font-size: 15px; font-weight: 600; width: 100%;
            transition: background 0.2s, border-color 0.2s;
        }
        .episodios-toggle-btn:hover { background: #222; border-color: #e50914; }
        .episodios-toggle-btn .ep-chevron { margin-left: auto; font-size: 18px; transition: transform 0.25s; }
        .episodios-toggle-btn.aberto .ep-chevron { transform: rotate(180deg); }
        .episodios-toggle-btn .ep-count { font-size: 13px; color: #888; font-weight: 400; }

        .episodios-painel {
            display: none; background: #181818;
            border: 1px solid #2a2a2a; border-top: none;
            border-radius: 0 0 10px 10px; overflow: hidden;
        }
        .episodios-painel.aberto { display: block; }

        .temporadas-nav {
            display: flex; gap: 0; overflow-x: auto;
            border-bottom: 1px solid #2a2a2a;
            scrollbar-width: none;
        }
        .temporadas-nav::-webkit-scrollbar { display: none; }
        .btn-temporada {
            flex-shrink: 0; padding: 12px 20px;
            background: none; border: none; border-bottom: 3px solid transparent;
            color: #888; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: color 0.2s, border-color 0.2s;
            white-space: nowrap;
        }
        .btn-temporada:hover { color: #fff; }
        .btn-temporada.ativa { color: #e50914; border-bottom-color: #e50914; }

        .episodios-lista { padding: 0 20px; max-height: 420px; overflow-y: auto; }
        .episodios-lista::-webkit-scrollbar { width: 4px; }
        .episodios-lista::-webkit-scrollbar-track { background: #111; }
        .episodios-lista::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

        .ep-item {
            display: flex; gap: 16px; align-items: flex-start;
            padding: 16px 0; border-bottom: 1px solid #232323;
        }
        .ep-item:last-child { border-bottom: none; }
        .ep-num {
            flex-shrink: 0; width: 36px; height: 36px;
            background: #e50914; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #fff;
        }
        .ep-body { flex: 1; }
        .ep-titulo { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .ep-meta { font-size: 12px; color: #666; margin-bottom: 6px; }
        .ep-desc { font-size: 13px; color: #aaa; line-height: 1.5; }

        /* Avaliações */
        .ep-item { border-bottom: 1px solid #333; padding: 15px 0; }
        .ep-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
<nav>
    <a href="home.html" class="logo">CineTracker</a>
    <div class="nav-links">
        <a href="home.html">Início</a>
        <a href="admin.html" id="linkAdmin" style="display: none;">Painel Admin</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" onclick="API.encerrarSessao()">Sair</a>
    </div>
</nav>

<div class="detalhes-container">
    <img id="poster" class="detalhes-poster" src="" alt="Poster">
    <div class="detalhes-info">
        <h1 id="titulo" class="detalhes-titulo">Carregando...</h1>
        <div id="tags" class="detalhes-tags"></div>
        <p id="descricao" class="detalhes-sinopse"></p>

        <div id="streamingSection" style="display: none; margin-top: 20px; margin-bottom: 30px;">
            <h3 style="color: #e50914; font-size: 1.2rem; margin-bottom: 10px;">Onde Assistir</h3>
            <div id="listaStreamings" style="display: flex; gap: 12px; flex-wrap: wrap;"></div>
        </div>

        <div id="areaEpisodios"></div>

        <div id="areaAvaliacoes" style="margin-top: 50px; border-top: 1px solid #333; padding-top: 30px;">
            <h2 style="color: #fff; margin-bottom: 20px;">Avaliações da Comunidade</h2>

            <form id="formAvaliacao" style="background: #181818; padding: 20px; border-radius: 8px; margin-bottom: 30px;">
                <h3 id="tituloFormAvaliacao" style="color: #fff; margin-bottom: 15px; font-size: 18px;">Deixe sua avaliação</h3>
                <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                    <select id="notaAvaliacao" style="padding: 10px; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 4px; outline: none;">
                        <option value="5">5 ⭐ Excelente</option>
                        <option value="4">4 ⭐ Muito Bom</option>
                        <option value="3">3 ⭐ Bom</option>
                        <option value="2">2 ⭐ Regular</option>
                        <option value="1">1 ⭐ Ruim</option>
                    </select>
                    <input type="text" id="comentarioAvaliacao" placeholder="Escreva o que achou..." style="flex: 1; padding: 10px; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 4px; outline: none;" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" id="btnSubmitAvaliacao" class="btn-primary" style="width: auto; padding: 10px 25px;">Publicar Avaliação</button>
                    <button type="button" id="btnCancelarEdicao" class="btn-secondary" style="display: none; width: auto; padding: 10px 25px;" onclick="cancelarEdicaoAvaliacao()">Cancelar Edição</button>
                </div>
            </form>

            <div id="listaAvaliacoesRender" style="display: flex; flex-direction: column; gap: 15px;"></div>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/detalhes.js"></script>
</body>
</html>
