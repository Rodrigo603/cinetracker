<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Início - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a href="home.html" class="logo">CineTracker</a>
    <div class="nav-links">
        <a href="home.html">Início</a>
        <a href="admin.html" id="linkAdmin" style="display: none;">Painel Admin</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" id="btnSair">Sair</a>
    </div>
</nav>

<div style="display: flex; justify-content: flex-end; margin-top: 40px; margin-bottom: 20px; padding: 0 5%; width: 100%; box-sizing: border-box;">
    <div style="display: flex; gap: 10px; max-width: 500px; width: 100%;">
        <input type="text" id="inputBuscaHome" placeholder="Buscar filmes ou séries..."
               style="flex: 1; padding: 12px 15px; background: #222; border: 1px solid #444; border-radius: 6px; color: white; font-size: 15px; outline: none;">
        <button class="btn-primary" onclick="pesquisarHome()" style="width: auto; padding: 0 20px;">Buscar</button>
        <button class="btn-secondary" id="btnLimparBusca" onclick="limparBuscaHome()" style="width: auto; padding: 0 20px; display: none;">Limpar</button>
    </div>
</div>

<div class="row">
    <h2 class="row-title" id="tituloSecaoFilmes">Filmes no Catálogo</h2>
    <div class="posters" id="listaFilmes"></div>
</div>

<div class="row">
    <h2 class="row-title" id="tituloSecaoSeries">Séries no Catálogo</h2>
    <div class="posters" id="listaSeries"></div>
</div>

<div class="row">
    <h2 class="row-title">Aclamados pela Comunidade</h2>
    <div class="posters" id="home-media-alta">Carregando dados...</div>
</div>

<div class="row">
    <h2 class="row-title">Melhores Críticas de Ação</h2>
    <div class="posters" id="home-genero-acao">Carregando dados...</div>
</div>

<div class="row">
    <h2 class="row-title">Séries Acima da Média</h2>
    <div class="posters" id="home-series-media">Carregando dados...</div>
</div>

<div class="row">
    <h2 class="row-title">Seja o Primeiro a Avaliar</h2>
    <div class="posters" id="home-sem-avaliacao">Carregando dados...</div>
</div>

<script src="js/api.js"></script>
<script src="js/home.js"></script>
<script src="js/explorar.js"></script>
</body>
</html>
