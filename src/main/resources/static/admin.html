<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-grid { display: flex; flex-direction: column; gap: 30px; }
        .action-buttons { display: flex; gap: 10px; }
        .hidden { display: none; }
        .form-section { border-top: 1px solid #333; padding-top: 20px; margin-top: 20px; }
        .editing-mode { border: 2px solid #e50914 !important; box-shadow: 0 0 20px rgba(229, 9, 20, 0.2); }
        textarea.custom-textarea { width: 100%; padding: 16px; background-color: #2b2b2b; border: 1px solid transparent; border-radius: 6px; color: #fff; font-size: 16px; margin-top: 5px; resize: vertical; font-family: inherit; }
        textarea.custom-textarea:focus { outline: none; border: 1px solid #e50914; background-color: #333; }
    </style>
</head>
<body>
<nav>
    <a href="home.html" class="logo">CineTracker</a>
    <div class="nav-links">
        <a href="home.html">Início</a>
        <a href="admin.html">Painel Admin</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" onclick="API.encerrarSessao()">Sair</a>
    </div>
</nav>

<div class="content-section admin-grid">

    <div class="form-card" id="form-midia-container">
        <h2 id="titulo-form-midia">Buscar e Adicionar Filme</h2>
        <form id="formMidia" onsubmit="adicionarMidia(event)">
            <div class="input-group">
                <label>Qual filme pretende adicionar? (Busca automática no OMDb)</label>
                <input type="text" id="tituloMedia" placeholder="Ex: The Matrix" required>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn-primary" id="btn-salvar-midia">Adicionar ao Catálogo</button>
            </div>
        </form>
    </div>

    <div class="form-card hidden" id="form-editar-container">
        <h2>Editar Dados do Filme</h2>
        <form id="formEditarMidia" onsubmit="salvarEdicao(event)">
            <input type="hidden" id="editIdMidia">
            <input type="hidden" id="editDuracao">
            <input type="hidden" id="editBilheteria">

            <div class="input-group">
                <label>Título do Filme</label>
                <input type="text" id="editTitulo" required>
            </div>
            <div class="input-group">
                <label>Descrição / Sinopse</label>
                <textarea id="editDescricao" class="custom-textarea" rows="5" required></textarea>
            </div>
            <div class="input-group">
                <label>URL do Pôster</label>
                <input type="text" id="editPoster" required>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn-primary">Salvar Alterações</button>
                <button type="button" class="btn-secondary" onclick="cancelarEdicao()">Cancelar</button>
            </div>
        </form>
    </div>

    <div class="form-card">
        <h2>Filmes Cadastrados</h2>
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Ações</th>
            </tr>
            </thead>
            <tbody id="listaFilmesTbody"></tbody>
        </table>
    </div>

    <div class="form-card form-section">
        <h2>Adicionar Novo Administrador</h2>
        <form onsubmit="criarNovoAdmin(event)">
            <div class="input-group"><label>Nome Completo</label><input type="text"     id="nomeAdmin"  required></div>
            <div class="input-group"><label>E-mail (deve conter 'admin')</label><input type="email"    id="emailAdmin" required></div>
            <div class="input-group"><label>Telefone</label><input type="tel"      id="telAdmin"   required></div>
            <div class="input-group"><label>Senha</label><input type="password" id="senhaAdmin" required></div>
            <button type="submit" class="btn-primary">Cadastrar Administrador</button>
        </form>
    </div>

    <div class="form-card">
        <h2>Remover Conta do Sistema</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
            Remova administradores ou utilizadores comuns permanentemente através do ID.
        </p>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="idUsuarioExcluir" placeholder="Digite o ID (Ex: 4)"
                   style="flex: 1; padding: 12px; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 4px;">
            <button class="btn-primary"
                    style="background-color: #e50914; width: auto; padding: 0 25px;"
                    onclick="excluirUsuario()">Excluir Permanentemente</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    let filmesCatalogo = []; // Guarda os filmes na memória para a edição

    document.addEventListener("DOMContentLoaded", () => {
        const u = API.getSessao();
        if (!u || !u.admin) { window.location.href = 'home.html'; return; }
        carregarCatalogo();
    });

    async function carregarCatalogo() {
        const res = await API.listarFilmes();
        if (!res.ok) return;

        filmesCatalogo = await res.json();
        const tbody  = document.getElementById('listaFilmesTbody');
        tbody.innerHTML = '';

        filmesCatalogo.forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${f.idMidia}</td>
                <td>${f.titulo}</td>
                <td class="action-buttons">
                    <button class="btn-small btn-edit" onclick="prepararEdicao(${f.idMidia})">Editar</button>
                    <button class="btn-small btn-danger" onclick="deletarMidia(${f.idMidia})">Excluir</button>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    // ── Lógica de Adicionar (Apenas Título) ──────────────────
    async function adicionarMidia(event) {
        event.preventDefault();
        const tituloMedia = document.getElementById('tituloMedia').value;
        const payload = { titulo: tituloMedia };

        document.getElementById('btn-salvar-midia').innerText = "Buscando na OMDb...";

        try {
            const res = await API.criarFilme(payload);
            if (res.ok) {
                alert(await res.text());
                document.getElementById('formMidia').reset();
                carregarCatalogo();
            } else {
                alert(await res.text() || "Erro ao adicionar filme.");
            }
        } catch (error) {
            console.error("Erro:", error);
            alert("Erro de comunicação com o servidor.");
        } finally {
            document.getElementById('btn-salvar-midia').innerText = "Adicionar ao Catálogo";
        }
    }

    // ── Lógica de Editar (Preencher Formulário) ──────────────
    function prepararEdicao(id) {
        const filme = filmesCatalogo.find(f => f.idMidia === id);
        if (!filme) return;

        // Preenche os campos de edição
        document.getElementById('editIdMidia').value = filme.idMidia;
        document.getElementById('editTitulo').value = filme.titulo;
        document.getElementById('editDescricao').value = filme.descricao || '';
        document.getElementById('editPoster').value = filme.posterUrl || '';
        document.getElementById('editDuracao').value = filme.duracao || 0;
        document.getElementById('editBilheteria').value = filme.bilheteria || 0;

        // Alterna a visibilidade dos cards
        document.getElementById('form-midia-container').classList.add('hidden');
        const editContainer = document.getElementById('form-editar-container');
        editContainer.classList.remove('hidden');
        editContainer.classList.add('editing-mode');

        editContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => editContainer.classList.remove('editing-mode'), 2000);
    }

    async function salvarEdicao(event) {
        event.preventDefault();
        const id = document.getElementById('editIdMidia').value;


        const payload = {
            titulo: document.getElementById('editTitulo').value,
            descricao: document.getElementById('editDescricao').value,
            posterUrl: document.getElementById('editPoster').value,
            duracao: document.getElementById('editDuracao').value,
            bilheteria: document.getElementById('editBilheteria').value
        };

        try {
            const res = await API.atualizarFilme(id, payload);
            if (res.ok) {
                alert("Filme atualizado com sucesso!");
                cancelarEdicao();
                carregarCatalogo();
            } else {
                alert("Erro ao atualizar o filme.");
            }
        } catch (error) {
            console.error(error);
            alert("Erro de comunicação com o servidor.");
        }
    }

    function cancelarEdicao() {
        document.getElementById('formEditarMidia').reset();
        document.getElementById('form-editar-container').classList.add('hidden');
        document.getElementById('form-midia-container').classList.remove('hidden');
    }


    async function criarNovoAdmin(event) {
        event.preventDefault();
        const payload = {
            nome:      document.getElementById('nomeAdmin').value,
            email:     document.getElementById('emailAdmin').value,
            telefone:  document.getElementById('telAdmin').value,
            senha:     document.getElementById('senhaAdmin').value
        };
        const res = await API.criarAdmin(payload);
        if (res.ok) {
            alert("Sucesso: Novo administrador cadastrado!");
            event.target.reset();
        } else {
            alert("Erro ao cadastrar administrador. Verifique se o e-mail contém 'admin'.");
        }
    }

    async function excluirUsuario() {
        const id = document.getElementById('idUsuarioExcluir').value;
        if (!id) { alert("Por favor, insira um ID válido."); return; }
        if (!confirm(`Deseja realmente excluir permanentemente o ID ${id}?`)) return;

        const res = await API.excluirUsuario(id);
        if (res.ok) {
            alert("Usuário/Admin removido com sucesso!");
            document.getElementById('idUsuarioExcluir').value = '';
        } else {
            alert("Erro ao excluir. Verifique se o ID existe no banco de dados.");
        }
    }

    async function deletarMidia(id) {
        if (!confirm("Excluir filme do catálogo?")) return;
        await API.deletarFilme(id);
        carregarCatalogo();
    }
</script>
</body>
</html>
