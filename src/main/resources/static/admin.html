<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo - CineTracker</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-grid { display: flex; flex-direction: column; gap: 30px; }
        .action-buttons { display: flex; gap: 10px; }
        .hidden { display: none; }
        .form-section { border-top: 1px solid #333; padding-top: 20px; margin-top: 20px; }
        .editing-mode { border: 2px solid #e50914 !important; box-shadow: 0 0 20px rgba(229, 9, 20, 0.2); }
        textarea.custom-textarea { width: 100%; padding: 16px; background-color: #2b2b2b; border: 1px solid transparent; border-radius: 6px; color: #fff; font-size: 16px; margin-top: 5px; resize: vertical; font-family: inherit; }
        textarea.custom-textarea:focus { outline: none; border: 1px solid #e50914; background-color: #333; }
        /* Estilo extra para a mensagem de busca vazia */
        #msgBuscaVazia { text-align: center; color: #888; margin-top: 20px; font-weight: 500; }
    </style>
</head>
<body>
<nav>
    <a href="home.html" class="logo">CineTracker</a>
    <div class="nav-links">
        <a href="home.html">Início</a>
        <a href="admin.html">Painel Admin</a>
        <a href="perfil.html">Perfil</a>
        <a href="#" onclick="API.encerrarSessao()">Sair</a>
    </div>
</nav>

<div class="content-section admin-grid">

    <div class="form-card" id="form-midia-container">
        <h2 id="titulo-form-midia">Buscar e Adicionar Filme</h2>
        <form id="formMidia" onsubmit="adicionarMidia(event)">
            <div class="input-group">
                <label>Qual filme pretende adicionar? (Busca automática no OMDb)</label>
                <input type="text" id="tituloMedia" placeholder="Ex: The Matrix" required>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn-primary" id="btn-salvar-midia">Adicionar ao Catálogo</button>
            </div>
        </form>
    </div>

    <div class="form-card hidden" id="form-editar-container">
        <h2>Editar Dados do Filme</h2>
        <form id="formEditarMidia" onsubmit="salvarEdicao(event)">
            <input type="hidden" id="editIdMidia">
            <input type="hidden" id="editDuracao">
            <input type="hidden" id="editBilheteria">

            <div class="input-group">
                <label>Título do Filme</label>
                <input type="text" id="editTitulo" required>
            </div>
            <div class="input-group">
                <label>Descrição / Sinopse</label>
                <textarea id="editDescricao" class="custom-textarea" rows="5" required></textarea>
            </div>
            <div class="input-group">
                <label>URL do Pôster</label>
                <input type="text" id="editPoster" required>
            </div>
            <div class="action-buttons">
                <button type="submit" class="btn-primary">Salvar Alterações</button>
                <button type="button" class="btn-secondary" onclick="cancelarEdicao()">Cancelar</button>
            </div>
        </form>
    </div>

    <div class="form-card">
        <h2>Filmes Cadastrados</h2>

        <div class="input-group">
            <input type="text" id="inputBuscaFilme" placeholder="Pesquisar filme por título..." onkeyup="filtrarFilmes()">
        </div>

        <table style="table-layout: fixed; width: 100%;">
            <thead>
            <tr>
                <th style="width: 15%;">ID</th>
                <th style="width: 55%;">Título</th>
                <th style="width: 30%;">Ações</th>
            </tr>
            </thead>
            <tbody id="listaFilmesTbody"></tbody>
        </table>

        <p id="msgBuscaVazia" style="display: none;">Filme não cadastrado.</p>
    </div>

    <div class="form-card form-section">
        <h2>Adicionar Novo Administrador</h2>
        <form onsubmit="criarNovoAdmin(event)">
            <div class="input-group"><label>Nome Completo</label><input type="text"     id="nomeAdmin"  required></div>
            <div class="input-group"><label>E-mail (deve conter 'admin')</label><input type="email"    id="emailAdmin" required></div>
            <div class="input-group"><label>Telefone</label><input type="tel"      id="telAdmin"   required></div>
            <div class="input-group"><label>Senha</label><input type="password" id="senhaAdmin" required></div>
            <button type="submit" class="btn-primary">Cadastrar Administrador</button>
        </form>
    </div>

    <div class="form-card">
        <h2>Remover Conta do Sistema</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
            Remova administradores ou utilizadores comuns permanentemente através do ID.
        </p>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="idUsuarioExcluir" placeholder="Digite o ID (Ex: 4)"
                   style="flex: 1; padding: 12px; background: #2b2b2b; color: white; border: 1px solid #444; border-radius: 4px;">
            <button class="btn-primary"
                    style="background-color: #e50914; width: auto; padding: 0 25px;"
                    onclick="excluirUsuario()">Excluir Permanentemente</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
